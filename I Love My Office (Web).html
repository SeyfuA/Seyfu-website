  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

off2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"9713c797-59c9-4dbd-b2b7-234a6f418a83\"><\u002Fscript>\n<script src=\"ce02b31d-a1ab-467f-8297-05e60ae7fe65\"><\u002Fscript>\n<script src=\"706baa53-cfe1-45ba-b98f-42c21e8a6823\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#e9e5dd;font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#2c2721}\n  input,select,button{font-family:inherit}\n  select{appearance:none;-webkit-appearance:none}\n  ::-webkit-scrollbar{width:9px;height:9px}\n  ::-webkit-scrollbar-thumb{background:rgba(44,39,33,.16);border-radius:9px}\n<\u002Fstyle>\n\n<\u002Fhelmet>\n\n<!-- ================= SIGN IN ================= -->\n<sc-if value=\"{{ notSignedIn }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f6f1e9;padding:40px\">\n    <div style=\"max-width:640px;width:100%;text-align:center\">\n      <div style=\"width:52px;height:52px;border-radius:15px;background:#c66a4a;display:flex;align-items:center;justify-content:center;color:#fff;font:700 26px 'Bricolage Grotesque',sans-serif;margin:0 auto 18px\">♥<\u002Fdiv>\n      <div style=\"font:700 30px 'Bricolage Grotesque',sans-serif;letter-spacing:-.02em\">Welcome to I Love My Office<\u002Fdiv>\n      <div style=\"color:#8a8175;font-size:15px;margin:8px 0 30px\">Select your name to sign in and submit your plan.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px\">\n        <sc-for list=\"{{ loginPeople }}\" as=\"p\" hint-placeholder-count=\"20\">\n          <div onclick=\"{{ p.onSel }}\" style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.1);border-radius:13px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer\">\n            <div style=\"{{ p.avatarStyle }}\">{{ p.initials }}<\u002Fdiv>\n            <div style=\"font-weight:600;font-size:13.5px\">{{ p.name }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ================= APP ================= -->\n<sc-if value=\"{{ signedIn }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;height:100vh;overflow:hidden;background:#f6f1e9;font-size:14px;position:relative\">\n\n  <sc-if value=\"{{ flash }}\" hint-placeholder-val=\"\">\n    <div style=\"position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:20;background:#3f6a45;color:#fff;padding:10px 18px;border-radius:11px;font-weight:600;font-size:13px;box-shadow:0 6px 20px rgba(40,34,26,.2)\">{{ flash }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SIDEBAR -->\n  <aside style=\"width:216px;flex:none;background:#efe7da;padding:22px 16px;display:flex;flex-direction:column;gap:5px;border-right:1px solid rgba(44,39,33,.08)\">\n    <div style=\"display:flex;align-items:center;gap:9px;padding:2px 8px 22px\">\n      <div style=\"width:31px;height:31px;border-radius:9px;background:#c66a4a;display:flex;align-items:center;justify-content:center;color:#fff;font:700 15px 'Bricolage Grotesque',sans-serif\">♥<\u002Fdiv>\n      <div style=\"font:700 15px 'Bricolage Grotesque',sans-serif;letter-spacing:-.01em\">I Love My Office<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"6\">\n      <div onclick=\"{{ item.onSel }}\" style=\"{{ item.style }}\">\n        <span style=\"{{ item.dotStyle }}\"><\u002Fspan>{{ item.label }}\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px 4px;border-top:1px solid rgba(44,39,33,.09)\">\n      <div style=\"{{ meAvatarStyle }}\">{{ meInitials }}<\u002Fdiv>\n      <div style=\"line-height:1.25;flex:1\"><div style=\"font-weight:600;display:flex;align-items:center;gap:6px\">{{ meName }}<sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"\"><span style=\"font-size:9.5px;font-weight:700;color:#fff;background:#c66a4a;padding:2px 7px;border-radius:20px\">ADMIN<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:11.5px;color:#8a8175\">{{ meOffice }}<\u002Fdiv><\u002Fdiv>\n      <div onclick=\"{{ signOut }}\" title=\"Sign out\" style=\"font-size:11.5px;color:#a89a83;cursor:pointer;font-weight:600\">Exit<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <main style=\"flex:1;overflow-y:auto;padding:26px 30px 40px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px\">\n      <div>\n        <div style=\"font:600 12px 'Hanken Grotesk';color:#a89a83;letter-spacing:.05em;text-transform:uppercase\">{{ dateStr }}<\u002Fdiv>\n        <div style=\"font:600 27px 'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;margin-top:3px\">{{ pageTitle }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px\">\n        <div onclick=\"{{ goPlan }}\" style=\"padding:9px 15px;border-radius:11px;background:#fffdf9;border:1px solid rgba(44,39,33,.12);font-weight:600;font-size:13px;cursor:pointer\">Submit plan<\u002Fdiv>\n        <div onclick=\"{{ goRoom }}\" style=\"padding:9px 17px;border-radius:11px;background:#2c2721;color:#f6f1e9;font-weight:600;font-size:13px;cursor:pointer\">Book the room<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HOME -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#fffdf9;border-radius:16px;padding:20px 22px;display:flex;gap:22px;align-items:center;border:1px solid rgba(44,39,33,.06)\">\n          <div style=\"flex:1\">\n            <div style=\"font-size:12px;color:#a89a83;font-weight:600;letter-spacing:.03em;text-transform:uppercase\">{{ heroKicker }}<\u002Fdiv>\n            <div style=\"font:600 21px 'Bricolage Grotesque',sans-serif;margin:5px 0 3px\">{{ myDeskLabel }}<\u002Fdiv>\n            <div style=\"color:#8a8175;font-size:13px\">{{ nearbyText }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:9px\">\n            <div style=\"{{ checkBadgeStyle }}\">{{ checkBadgeLabel }}<\u002Fdiv>\n            <div onclick=\"{{ releaseDesk }}\" style=\"padding:10px 16px;border-radius:11px;border:1px solid rgba(44,39,33,.15);font-weight:600;font-size:13px;cursor:pointer\">Release desk<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fffdf9;border-radius:16px;padding:18px 20px;border:1px solid rgba(44,39,33,.06)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">\n            <div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">The office · live map<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a8175\">{{ freeLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px\">\n            <sc-for list=\"{{ homeOffices }}\" as=\"office\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid rgba(44,39,33,.1);border-radius:12px;padding:12px\">\n                <div style=\"font-size:12px;font-weight:600;color:#8a8175;margin-bottom:9px\">{{ office.title }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px\">\n                  <sc-for list=\"{{ office.desks }}\" as=\"desk\" hint-placeholder-count=\"5\">\n                    <span onclick=\"{{ desk.onSel }}\" title=\"{{ desk.title }}\" style=\"{{ desk.style }}\">{{ desk.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div onclick=\"{{ goRoom }}\" style=\"margin-top:12px;border:1px dashed rgba(44,39,33,.2);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer\">\n            <div style=\"font-size:13px;font-weight:600\">🚪 The Meeting Room · {{ roomCountLabel }}<\u002Fdiv>\n            <div style=\"{{ roomStatusStyle }}\">{{ roomStatusLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:16px;margin-top:14px;font-size:11.5px;color:#8a8175\">\n            <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#dcecd8\"><\u002Fspan>Free<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#e8dbd2\"><\u002Fspan>Taken<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#c66a4a\"><\u002Fspan>{{ meName }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div onclick=\"{{ goPlan }}\" style=\"background:#fffdf9;border-radius:16px;padding:18px 20px;border:1px solid rgba(44,39,33,.06);cursor:pointer\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\"><div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">Your plan<\u002Fdiv><div style=\"{{ planTodayStyle }}\">{{ planTodayLabel }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a8175\">{{ planHint }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fffdf9;border-radius:16px;padding:18px 20px;border:1px solid rgba(44,39,33,.06)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\"><div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">Facilities<\u002Fdiv><div style=\"font-size:12px;color:#c66a4a;font-weight:600\">{{ openLabel }}<\u002Fdiv><\u002Fdiv>\n            <sc-for list=\"{{ facilities }}\" as=\"f\" hint-placeholder-count=\"2\">\n              <div style=\"font-size:13px;color:#5a5147;display:flex;gap:9px;padding:6px 0;align-items:center\"><span style=\"{{ f.dotStyle }}\"><\u002Fspan><div>{{ f.text }} · <span style=\"color:#8a8175\">{{ f.meta }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n            <div onclick=\"{{ goFacilities }}\" style=\"margin-top:8px;padding:8px 0 0;border-top:1px solid rgba(44,39,33,.06);font-size:12.5px;color:#c66a4a;font-weight:600;cursor:pointer\">+ Report an issue<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- PLAN -->\n    <sc-if value=\"{{ isPlan }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:720px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;gap:6px;background:#efe7da;border-radius:12px;padding:5px;width:260px\">\n          <sc-for list=\"{{ scopeSeg }}\" as=\"s\" hint-placeholder-count=\"2\"><div onclick=\"{{ s.onSel }}\" style=\"{{ s.style }}\">{{ s.label }}<\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- daily -->\n        <sc-if value=\"{{ isDaily }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:20px 22px\">\n            <div style=\"font:600 16px 'Bricolage Grotesque',sans-serif;margin-bottom:2px\">Today · {{ planDate }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a8175;margin-bottom:16px\">Let the team know where you'll be and what you're working on.<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:600;color:#8a8175;margin-bottom:7px\">Where are you?<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;background:#f2ece1;border-radius:11px;padding:5px;margin-bottom:16px\">\n              <sc-for list=\"{{ modeSeg }}\" as=\"m\" hint-placeholder-count=\"3\"><div onclick=\"{{ m.onSel }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:600;color:#8a8175;margin-bottom:7px\">What are you working on today?<\u002Fdiv>\n            <input value=\"{{ planNote }}\" onchange=\"{{ onPlanNote }}\" placeholder=\"e.g. Finishing the Q3 report, 2 client calls\" style=\"width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:14px;outline:none;margin-bottom:16px\">\n            <div onclick=\"{{ submitPlan }}\" style=\"display:inline-block;padding:11px 22px;border-radius:11px;background:#2c2721;color:#f6f1e9;font-weight:600;font-size:14px;cursor:pointer\">Submit today's plan<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- weekly -->\n        <sc-if value=\"{{ isWeekly }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:20px 22px\">\n            <div style=\"font:600 16px 'Bricolage Grotesque',sans-serif;margin-bottom:2px\">{{ weekLabel }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a8175;margin-bottom:16px\">Set your status for each day this week.<\u002Fdiv>\n            <sc-for list=\"{{ weekRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n                <div style=\"width:44px;font-weight:600;font-size:13.5px\">{{ row.day }}<\u002Fdiv>\n                <div style=\"flex:1;display:flex;gap:6px;background:#f2ece1;border-radius:10px;padding:4px\">\n                  <sc-for list=\"{{ row.seg }}\" as=\"o\" hint-placeholder-count=\"3\"><div onclick=\"{{ o.onSel }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <input value=\"{{ weekNote }}\" onchange=\"{{ onWeekNote }}\" placeholder=\"Notes for the week (optional)\" style=\"width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:14px;outline:none;margin:8px 0 16px\">\n            <div onclick=\"{{ submitPlan }}\" style=\"display:inline-block;padding:11px 22px;border-radius:11px;background:#2c2721;color:#f6f1e9;font-weight:600;font-size:14px;cursor:pointer\">Submit weekly plan<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:8px 22px 10px\">\n          <div style=\"font:600 15px 'Bricolage Grotesque',sans-serif;padding:12px 0 4px\">Submitted plans<\u002Fdiv>\n          <sc-if value=\"{{ noPlans }}\" hint-placeholder-val=\"\"><div style=\"padding:10px 0 16px;color:#a89a83;font-size:13px\">No plans submitted yet.<\u002Fdiv><\u002Fsc-if>\n          <sc-for list=\"{{ plansList }}\" as=\"p\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-top:1px solid rgba(44,39,33,.07)\">\n              <div style=\"{{ p.avatarStyle }}\">{{ p.initials }}<\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font-weight:600\">{{ p.who }} <span style=\"color:#c66a4a;font-size:12px;font-weight:600\">· {{ p.scopeLabel }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#5a5147;margin-top:1px\">{{ p.line1 }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8a8175;margin-top:1px\">{{ p.line2 }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#a89a83\">{{ p.when }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- DESKS -->\n    <sc-if value=\"{{ isDesks }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#eaf1e7;border:1px solid rgba(79,122,83,.25);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center\">\n          <div style=\"color:#3f6a45\"><b>{{ myDeskLabel }}<\u002Fb> — tap any free desk below to move.<\u002Fdiv>\n          <div onclick=\"{{ releaseDesk }}\" style=\"padding:8px 14px;border-radius:10px;background:#fffdf9;border:1px solid rgba(44,39,33,.14);font-weight:600;font-size:12.5px;cursor:pointer\">Release my desk<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px\">\n          <sc-for list=\"{{ deskOffices }}\" as=\"office\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:16px 16px 18px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px\"><div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">{{ office.title }}<\u002Fdiv><div style=\"font-size:11.5px;color:#8a8175\">{{ office.freeText }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n                <sc-for list=\"{{ office.desks }}\" as=\"desk\" hint-placeholder-count=\"5\">\n                  <div onclick=\"{{ desk.onSel }}\" style=\"{{ desk.style }}\">\n                    <span style=\"font-size:10.5px;opacity:.7;font-weight:600\">Desk {{ desk.num }}<\u002Fspan>\n                    <span style=\"font-weight:700;font-size:13.5px\">{{ desk.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- MEETING ROOM (bookable) -->\n    <sc-if value=\"{{ isRoom }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:660px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:20px 22px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:600 19px 'Bricolage Grotesque',sans-serif\">The Meeting Room<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a8175;margin-top:2px\">Seats 8 · projector · whiteboard<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ roomStatusStyle }}\">{{ roomStatusLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:18px 22px\">\n          <div style=\"font:600 15px 'Bricolage Grotesque',sans-serif;margin-bottom:14px\">Book the room<\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap\">\n            <div>\n              <div style=\"font-size:12px;color:#8a8175;font-weight:600;margin-bottom:6px\">From<\u002Fdiv>\n              <select value=\"{{ newStart }}\" onchange=\"{{ onStartChange }}\" style=\"padding:11px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:14px;font-weight:600\">\n                <sc-for list=\"{{ timeOpts }}\" as=\"t\" hint-placeholder-count=\"6\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:12px;color:#8a8175;font-weight:600;margin-bottom:6px\">To<\u002Fdiv>\n              <select value=\"{{ newEnd }}\" onchange=\"{{ onEndChange }}\" style=\"padding:11px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:14px;font-weight:600\">\n                <sc-for list=\"{{ timeOpts }}\" as=\"t\" hint-placeholder-count=\"6\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:180px\">\n              <div style=\"font-size:12px;color:#8a8175;font-weight:600;margin-bottom:6px\">Purpose<\u002Fdiv>\n              <input value=\"{{ newTitle }}\" onchange=\"{{ onTitleChange }}\" placeholder=\"e.g. Design review\" style=\"width:100%;padding:11px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:14px;outline:none\">\n            <\u002Fdiv>\n            <div onclick=\"{{ bookRoom }}\" style=\"padding:11px 22px;border-radius:11px;background:#2c2721;color:#f6f1e9;font-weight:600;font-size:14px;cursor:pointer\">Book<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:8px 22px 12px\">\n          <div style=\"font:600 15px 'Bricolage Grotesque',sans-serif;padding:12px 0 4px\">Today's bookings<\u002Fdiv>\n          <sc-if value=\"{{ noBookings }}\" hint-placeholder-val=\"\"><div style=\"padding:10px 0 16px;color:#a89a83;font-size:13px\">Room is free all day — be the first to book.<\u002Fdiv><\u002Fsc-if>\n          <sc-for list=\"{{ bookings }}\" as=\"b\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:13px 0;border-top:1px solid rgba(44,39,33,.07)\">\n              <div style=\"font:600 14px 'Bricolage Grotesque',sans-serif;width:104px;color:#2c2721\">{{ b.range }}<\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font-weight:600\">{{ b.title }}<\u002Fdiv><div style=\"font-size:12px;color:#8a8175\">{{ b.by }}<\u002Fdiv><\u002Fdiv>\n              <div onclick=\"{{ b.onCancel }}\" style=\"{{ b.cancelStyle }}\">{{ b.cancelLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- PEOPLE -->\n    <sc-if value=\"{{ isPeople }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px\">\n        <sc-for list=\"{{ peopleGroups }}\" as=\"group\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:16px 18px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px\"><div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">{{ group.title }}<\u002Fdiv><div style=\"font-size:11.5px;color:#8a8175\">{{ group.presentText }}<\u002Fdiv><\u002Fdiv>\n            <sc-for list=\"{{ group.members }}\" as=\"p\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:11px;padding:7px 0\">\n                <div style=\"{{ p.avatarStyle }}\">{{ p.initials }}<\u002Fdiv>\n                <div style=\"flex:1;font-weight:500\">{{ p.name }}<\u002Fdiv>\n                <div style=\"{{ p.statusStyle }}\">{{ p.status }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- FACILITIES -->\n    <sc-if value=\"{{ isFacilities }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:640px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:18px 20px\">\n          <div style=\"font:600 15px 'Bricolage Grotesque',sans-serif;margin-bottom:10px\">Report an issue<\u002Fdiv>\n          <div style=\"display:flex;gap:10px\">\n            <input value=\"{{ facDraft }}\" onchange=\"{{ onFacInput }}\" onkeydown=\"{{ onFacKey }}\" placeholder=\"What needs fixing? e.g. Light out in Office 3\" style=\"flex:1;padding:11px 14px;border-radius:11px;border:1px solid rgba(44,39,33,.15);background:#f6f1e9;font-size:13.5px;outline:none\">\n            <div onclick=\"{{ reportIssue }}\" style=\"padding:11px 20px;border-radius:11px;background:#2c2721;color:#f6f1e9;font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center\">Submit<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf9;border:1px solid rgba(44,39,33,.07);border-radius:16px;padding:8px 20px\">\n          <sc-for list=\"{{ facilities }}\" as=\"f\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid rgba(44,39,33,.07)\">\n              <span style=\"{{ f.dotStyle }}\"><\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-weight:600\">{{ f.text }}<\u002Fdiv><div style=\"font-size:12px;color:#8a8175\">{{ f.meta }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"{{ f.priStyle }}\">{{ f.pri }}<\u002Fdiv>\n              <sc-if value=\"{{ f.showResolve }}\" hint-placeholder-val=\"\">\n                <div onclick=\"{{ f.onResolve }}\" style=\"padding:6px 13px;border-radius:9px;background:#eaf1e7;color:#4f7a53;font-weight:600;font-size:12px;cursor:pointer\">Resolve<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- CHAT RAIL -->\n  <aside style=\"width:288px;flex:none;background:#efe7da;border-left:1px solid rgba(44,39,33,.08);display:flex;flex-direction:column\">\n    <div style=\"padding:18px 18px 13px;border-bottom:1px solid rgba(44,39,33,.09)\"><div style=\"font:600 15px 'Bricolage Grotesque',sans-serif\">Team chat<\u002Fdiv><div style=\"font-size:12px;color:#8a8175\">All offices · {{ onlineCount }} online<\u002Fdiv><\u002Fdiv>\n    <div style=\"flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:13px;overflow-y:auto\">\n      <sc-for list=\"{{ chat }}\" as=\"msg\" hint-placeholder-count=\"3\">\n        <div style=\"{{ msg.rowStyle }}\">\n          <div style=\"{{ msg.avatarStyle }}\">{{ msg.initials }}<\u002Fdiv>\n          <div style=\"{{ msg.colStyle }}\">\n            <div style=\"{{ msg.bubbleStyle }}\">{{ msg.text }}<\u002Fdiv>\n            <div style=\"{{ msg.metaStyle }}\">{{ msg.meta }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"padding:12px 14px;border-top:1px solid rgba(44,39,33,.09);display:flex;gap:8px\">\n      <input value=\"{{ chatDraft }}\" onchange=\"{{ onChatInput }}\" onkeydown=\"{{ onChatKey }}\" placeholder=\"Message the team…\" style=\"flex:1;background:#fffdf9;border:1px solid rgba(44,39,33,.14);border-radius:12px;padding:10px 13px;font-size:12.5px;outline:none\">\n      <div onclick=\"{{ sendChat }}\" style=\"width:38px;flex:none;border-radius:12px;background:#c66a4a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer\">↑<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  people = {\n    'Nicola':{i:'NI',c:'#7a9e7e'}, 'Abdoul':{i:'AB',c:'#c98a4a'}, 'Jesugnon':{i:'JE',c:'#8a6fb0'},\n    'Rahmat':{i:'RA',c:'#5a8bb0'}, 'Chabi':{i:'CH',c:'#c46a8a'}, 'Boneface':{i:'BO',c:'#5aa08a'}, 'New DO':{i:'DO',c:'#a0894a'},\n    'Chiara':{i:'CI',c:'#8a6fb0'}, 'Leena':{i:'LE',c:'#5aa08a'}, 'Abdi':{i:'AD',c:'#c98a4a'},\n    'Seyfu':{i:'SE',c:'#5a8bb0'}, 'Sadok':{i:'SA',c:'#c46a8a'}, 'Nelly':{i:'NE',c:'#7a9e7e'}, 'Margaret':{i:'MA',c:'#a0894a'},\n    'Mohammed':{i:'MO',c:'#5a8bb0'}, 'Melaine':{i:'ME',c:'#c46a8a'}, 'Sarah':{i:'SR',c:'#8a6fb0'},\n    'Diana':{i:'DI',c:'#5aa08a'}, 'Ahmed':{i:'AH',c:'#c98a4a'}, 'AO ABC':{i:'AO',c:'#a0894a'},\n    'Endalamaw':{i:'EN',c:'#6a8ab0'}, 'Rafiq':{i:'RF',c:'#b0794a'}\n  };\n  roster = {\n    'Office 1':['Nicola','Abdoul','Jesugnon','Rahmat','Chabi','Boneface','New DO'],\n    'Office 2':['Chiara','Leena','Abdi','Seyfu','Sadok','Nelly','Margaret'],\n    'Office 3':['Mohammed','Melaine','Sarah','Diana','Ahmed','AO ABC','Endalamaw','Rafiq']\n  };\n  DAYS = ['Mon','Tue','Wed','Thu','Fri'];\n  ADMINS = ['Margaret','Seyfu'];\n  state = {\n    currentUser: null,\n    view:'home', chatDraft:'', facDraft:'', flash:'',\n    planScope:'daily', planMode:'In office', planNote:'',\n    weekDays:{Mon:'In',Tue:'In',Wed:'Remote',Thu:'In',Fri:'Off'}, weekNote:'',\n    newStart:'10:00', newEnd:'11:00', newTitle:'',\n    offices:[\n      {name:'Office 1', side:'left',   seats:[null,null,null,null,null]},\n      {name:'Office 2', side:'middle', seats:[null,null,null,null,null]},\n      {name:'Office 3', side:'right',  seats:[null,null,null,null,null]}\n    ],\n    bookings:[],\n    facilities:[],\n    chat:[],\n    plans:[]\n  };\n\n  FB = {\n    apiKey: \"AIzaSyB6Yag7P6HrR3HSgp07QCQUx18MEm3BM1M\",\n    authDomain: \"i-love-my-office.firebaseapp.com\",\n    databaseURL: \"https://i-love-my-office-default-rtdb.firebaseio.com\",\n    projectId: \"i-love-my-office\",\n    storageBucket: \"i-love-my-office.firebasestorage.app\",\n    messagingSenderId: \"862340871378\",\n    appId: \"1:862340871378:web:b411247d15fa9808e3a90b\"\n  };\n\n  get ME(){ return this.state.currentUser; }\n  get isAdmin(){ return this.ADMINS.includes(this.ME); }\n  NOW = '10:15';\n\n  adminClearDesk(oi,di){\n    if(!this.db) return;\n    this.db.ref('seats/'+oi+'-'+di).remove();\n    this.flashMsg('Desk cleared');\n  }\n  resolveFacility(key){ if(this.db) this.db.ref('facilities/'+key).remove(); this.flashMsg('Marked resolved'); }\n\n  TEAM_PASSWORD = 'Perfect Day';\n  ADMIN_PASSWORD = 'Falcon-Harbor-73';\n  slug(name){ return name.toLowerCase().replace(/[^a-z0-9]+/g,''); }\n  emailFor(name){ return this.slug(name)+'@ilmoapp.local'; }\n  passwordFor(name){ return this.ADMINS.includes(name) ? this.ADMIN_PASSWORD : this.TEAM_PASSWORD; }\n\n  componentDidMount(){\n    try{ this._storedUser = localStorage.getItem('ilmo_user'); }catch(e){}\n    const start=()=>{ if(window.firebase && firebase.database && firebase.auth){ this.initFb(); } else { setTimeout(start,60); } };\n    start();\n  }\n  initFb(){\n    try{\n      if(!window._ilmoApp) window._ilmoApp = firebase.initializeApp(this.FB);\n      this.db = firebase.database(window._ilmoApp);\n      this.auth = firebase.auth(window._ilmoApp);\n    }catch(e){ console.warn('Firebase init failed', e); return; }\n    this.db.ref('seats').on('value', s=>{ const m=s.val()||{}; const offices=this.state.offices.map((o,oi)=>({...o, seats:[0,1,2,3,4].map(di=>m[oi+'-'+di]||null)})); this.setState({offices}); });\n    this.db.ref('bookings').on('value', s=>{ const v=s.val()||{}; const bookings=Object.keys(v).map(k=>({...v[k], key:k})).sort((a,c)=>a.start.localeCompare(c.start)); this.setState({bookings}); });\n    this.db.ref('plans').on('value', s=>{ const v=s.val()||{}; const plans=Object.keys(v).map(k=>({...v[k], key:k})).sort((a,c)=>(c.ts||0)-(a.ts||0)); this.setState({plans}); });\n    this.db.ref('chat').on('value', s=>{ const v=s.val()||{}; const chat=Object.keys(v).map(k=>({...v[k], key:k})).sort((a,c)=>(a.ts||0)-(c.ts||0)); this.setState({chat}); });\n    this.db.ref('facilities').on('value', s=>{ const v=s.val()||{}; const facilities=Object.keys(v).map(k=>({...v[k], key:k})).sort((a,c)=>(c.ts||0)-(a.ts||0)); this.setState({facilities}); });\n    if(this._storedUser){ this.authFor(this._storedUser).then(ok=>{ if(ok) this.setState({currentUser:this._storedUser}); }); }\n  }\n  flashMsg(m){ this.setState({flash:m}); clearTimeout(this._ft); this._ft=setTimeout(()=>this.setState({flash:''}),2400); }\n\n  async authFor(name){\n    if(!this.auth) return false;\n    const email=this.emailFor(name), pass=this.passwordFor(name);\n    try{ await this.auth.signInWithEmailAndPassword(email, pass); return true; }\n    catch(err){\n      if(err.code==='auth/user-not-found'){\n        try{ await this.auth.createUserWithEmailAndPassword(email, pass); return true; }\n        catch(e2){ this.flashMsg('Sign-in failed'); console.warn(e2); return false; }\n      }\n      this.flashMsg('Sign-in failed'); console.warn(err); return false;\n    }\n  }\n  signIn(name){\n    this.authFor(name).then(ok=>{\n      if(ok){ this.setState({currentUser:name, view:'home'}); try{ localStorage.setItem('ilmo_user', name); }catch(e){} }\n    });\n  }\n  signOut(){ this.setState({currentUser:null}); try{ localStorage.removeItem('ilmo_user'); }catch(e){} if(this.auth) this.auth.signOut(); }\n  go(v){ this.setState({view:v}); }\n\n  bookDesk(oi, di){\n    if(!this.db) return; const me=this.ME, key=oi+'-'+di;\n    this.db.ref('seats').transaction(m=>{ m=m||{}; Object.keys(m).forEach(k=>{ if(m[k]===me) delete m[k]; }); if(m[key]) return; m[key]=me; return m; }, (err,committed)=>{ if(!err && !committed) this.flashMsg('That desk was just taken'); });\n  }\n  releaseDesk(){\n    if(!this.db) return; const me=this.ME;\n    this.db.ref('seats').transaction(m=>{ if(!m) return m; Object.keys(m).forEach(k=>{ if(m[k]===me) delete m[k]; }); return m; });\n  }\n\n  genTimes(){ const t=[]; for(let h=8;h<=18;h++){ t.push(`${String(h).padStart(2,'0')}:00`); if(h<18) t.push(`${String(h).padStart(2,'0')}:30`); } return t; }\n  bookRoom(){\n    if(!this.db) return;\n    const {newStart,newEnd,newTitle} = this.state;\n    if(!newTitle.trim()){ this.flashMsg('Add a purpose for the booking'); return; }\n    if(newEnd <= newStart){ this.flashMsg('End time must be after start'); return; }\n    const overlaps = this.state.bookings.some(b => newStart < b.end && newEnd > b.start);\n    if(overlaps){ this.flashMsg('That time overlaps an existing booking'); return; }\n    this.db.ref('bookings').push({start:newStart, end:newEnd, title:newTitle.trim(), by:this.ME, ts:Date.now()});\n    this.setState({newTitle:''}); this.flashMsg('Room booked ✓');\n  }\n  cancelBooking(key){ if(this.db) this.db.ref('bookings/'+key).remove(); this.flashMsg('Booking cancelled'); }\n\n  submitPlan(){\n    if(!this.db) return; const u = this.ME; let entry;\n    if(this.state.planScope==='daily'){\n      entry = {who:u, when:'Just now', scope:'daily', ts:Date.now(),\n        line1:`${this.PLAN_DATE} · ${this.state.planMode}`,\n        line2: this.state.planNote.trim() || 'No note added' };\n    } else {\n      const wd=this.state.weekDays; const g=(v)=>this.DAYS.filter(d=>wd[d]===v).join(', ')||'—';\n      entry = {who:u, when:'Just now', scope:'weekly', ts:Date.now(),\n        line1:`${this.WEEK_LABEL}`,\n        line2:`In office: ${g('In')} · Remote: ${g('Remote')} · Off: ${g('Off')}` + (this.state.weekNote.trim()?` · ${this.state.weekNote.trim()}`:'') };\n    }\n    this.db.ref('plans').push(entry);\n    this.setState({planNote:'', weekNote:''}); this.flashMsg('Plan submitted ✓');\n  }\n\n  reportIssue(){\n    if(!this.db) return; const t=(this.state.facDraft||'').trim(); if(!t) return;\n    this.db.ref('facilities').push({text:t, by:this.ME, ago:'just now', pri:'Med', ts:Date.now()});\n    this.setState({facDraft:'', view:'facilities'});\n  }\n  sendChat(){\n    if(!this.db) return; const t=(this.state.chatDraft||'').trim(); if(!t) return;\n    this.db.ref('chat').push({name:this.ME, text:t, time:'now', ts:Date.now()});\n    this.setState({chatDraft:''});\n  }\n\n  myDesk(){\n    for(let oi=0; oi<this.state.offices.length; oi++){\n      const di=this.state.offices[oi].seats.indexOf(this.ME); if(di>=0) return {oi,di,office:this.state.offices[oi]};\n    }\n    return null;\n  }\n  freeCount(){ return this.state.offices.reduce((n,o)=> n+o.seats.filter(s=>!s).length,0); }\n  myOffice(){ const n=Object.keys(this.roster).find(k=>this.roster[k].includes(this.ME)); return n||''; }\n\n  buildOffices(mode){\n    const admin=this.isAdmin;\n    return this.state.offices.map((o,oi)=>{\n      const desks=o.seats.map((occ,di)=>{\n        const isMine=occ===this.ME, isFree=!occ;\n        const p=occ?(this.people[occ]||{i:'?'}):null;\n        let bg,fg; if(isMine){bg='#c66a4a';fg='#fff';} else if(isFree){bg='#dcecd8';fg='#5f8560';} else {bg='#e8dbd2';fg='#9a6650';}\n        const span=di===4?'grid-column:1 / -1;justify-self:center;width:calc(50% - 5px);':'';\n        const canClear = admin && !isFree && !isMine;\n        const clickable = isFree || canClear;\n        if(mode==='mini') return {\n          style:`${span}aspect-ratio:1;border-radius:7px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;cursor:${clickable?'pointer':'default'}`,\n          label:isFree?'':p.i, title:isFree?'Free — tap to book':(canClear?`${occ} — tap to clear (admin)`:occ),\n          onSel:isFree?()=>this.bookDesk(oi,di):(canClear?()=>this.adminClearDesk(oi,di):()=>{})\n        };\n        return {\n          num:di+1,\n          style:`${span}display:flex;flex-direction:column;gap:3px;min-height:60px;justify-content:center;border-radius:12px;padding:10px 12px;background:${bg};color:${fg};cursor:${clickable?'pointer':'default'};border:1px solid rgba(44,39,33,.05)`,\n          label:isFree?'Free — tap to book':(canClear?`${occ} — clear (admin)`:occ),\n          onSel:isFree?()=>this.bookDesk(oi,di):(canClear?()=>this.adminClearDesk(oi,di):()=>{})\n        };\n      });\n      return {title:`${o.name} · ${o.side}`, freeText:`${o.seats.filter(s=>!s).length} free`, desks};\n    });\n  }\n\n  seg(active,label,onSel,small){ return {label, onSel, style:`flex:1;text-align:center;padding:${small?'6px 6px':'9px 10px'};border-radius:9px;cursor:pointer;font-weight:600;font-size:${small?'11.5px':'12.5px'};${active?'background:#c66a4a;color:#fff':'color:#8a7f6f'}`}; }\n\n  renderVals(){\n    this.PLAN_DATE = 'Tuesday, Jul 8';\n    this.WEEK_LABEL = 'Week of Jul 7 · 5 days';\n    const signedIn = !!this.state.currentUser;\n    const view = this.state.view;\n    const me = this.ME;\n    const mep = signedIn ? (this.people[me]||{i:'?',c:'#7a9e7e'}) : {i:'',c:'#7a9e7e'};\n\n    // login grid\n    const loginPeople = Object.keys(this.people).map(name=>{\n      const p=this.people[name];\n      return {name, initials:p.i, onSel:()=>this.signIn(name),\n        avatarStyle:`width:44px;height:44px;border-radius:50%;background:${p.c};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px`};\n    });\n\n    if(!signedIn){ return {notSignedIn:true, signedIn:false, loginPeople}; }\n\n    const md=this.myDesk(); const free=this.freeCount();\n    const titles={home:`Good day, ${me}`, plan:'My plan', desks:'Book a desk', room:'Meeting room', people:'People', facilities:'Facilities'};\n\n    const items=[{key:'home',label:'Home'},{key:'plan',label:'My plan'},{key:'desks',label:'Book a desk'},{key:'room',label:'Meeting room'},{key:'people',label:'People'},{key:'facilities',label:'Facilities'}];\n    const nav=items.map(it=>{ const a=view===it.key; return {label:it.label, onSel:()=>this.go(it.key),\n      style:`display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;cursor:pointer;font-weight:${a?600:500};background:${a?'#c66a4a':'transparent'};color:${a?'#fff':'#6b6355'}`,\n      dotStyle:`width:7px;height:7px;flex:none;border-radius:50%;background:${a?'#fff':'#c9bfae'}`}; });\n\n    // meeting room bookings\n    const now=this.NOW;\n    const busyNow=this.state.bookings.some(b=>now>=b.start && now<b.end);\n    const bookings=this.state.bookings.slice().sort((a,c)=>a.start.localeCompare(c.start)).map(b=>{\n      const mine=b.by===this.ME; const can=mine||this.isAdmin;\n      return {range:`${b.start} – ${b.end}`, title:b.title, by:mine?`${b.by} (you)`:b.by,\n        cancelLabel: can?(mine?'Cancel':'Cancel (admin)'):'Booked',\n        cancelStyle: can?'padding:6px 13px;border-radius:9px;background:#f3e4dc;color:#b5674a;font-weight:600;font-size:12px;cursor:pointer':'padding:6px 13px;border-radius:9px;background:#eee8dd;color:#a89a83;font-weight:600;font-size:12px',\n        onCancel: can?()=>this.cancelBooking(b.key):()=>{}};\n    });\n\n    // plan segmented controls\n    const scopeSeg=[this.seg(this.state.planScope==='daily','Daily',()=>this.setState({planScope:'daily'})), this.seg(this.state.planScope==='weekly','Weekly',()=>this.setState({planScope:'weekly'}))];\n    const modeSeg=['In office','Remote','Off'].map(m=>this.seg(this.state.planMode===m,m,()=>this.setState({planMode:m})));\n    const weekRows=this.DAYS.map(d=>({day:d, seg:['In','Remote','Off'].map(v=>this.seg(this.state.weekDays[d]===v,v,()=>{ const wd={...this.state.weekDays,[d]:v}; this.setState({weekDays:wd}); },true))}));\n    const plansList=this.state.plans.map(p=>{ const pp=this.people[p.who]||{i:'?',c:'#8a8175'}; return {...p, scopeLabel:p.scope==='daily'?'Daily':'Weekly', initials:pp.i, avatarStyle:`width:34px;height:34px;flex:none;border-radius:50%;background:${pp.c};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px`}; });\n    const myTodayPlan=this.state.plans.find(p=>p.who===me && p.scope==='daily');\n\n    // facilities\n    const facilities=this.state.facilities.map(f=>{ const col=f.pri==='High'?'#c66a4a':'#d9a441'; const pc=f.pri==='High'?'background:#f3e4dc;color:#b5674a':'background:#f6edda;color:#b58a3d';\n      return {text:f.text, meta:`${f.by} · ${f.ago}`, pri:f.pri, dotStyle:`width:8px;height:8px;flex:none;border-radius:50%;background:${col}`, priStyle:`padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;${pc}`,\n        showResolve:this.isAdmin, onResolve:f.key?()=>this.resolveFacility(f.key):()=>{}}; });\n\n    // people\n    const seated=new Set(); this.state.offices.forEach(o=>o.seats.forEach(s=>{if(s)seated.add(s);}));\n    const peopleGroups=Object.keys(this.roster).map(name=>{ const members=this.roster[name].map(pn=>{ const p=this.people[pn]||{i:'?',c:'#8a8175'}; const inNow=seated.has(pn);\n      return {name:pn, initials:p.i, avatarStyle:`width:32px;height:32px;flex:none;border-radius:50%;background:${p.c};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px`, status:inNow?'In':'Away', statusStyle:`padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;${inNow?'background:#eaf1e7;color:#4f7a53':'background:#eee8dd;color:#a89a83'}`}; });\n      const nIn=members.filter(m=>m.status==='In').length; return {title:name, presentText:`${nIn} of ${members.length} in`, members}; });\n\n    // chat\n    const chat=this.state.chat.map(m=>{ const p=this.people[m.name]||{i:'?',c:'#8a8175'}; const mine=m.name===me;\n      return {initials:p.i, text:m.text, meta:`${m.name} · ${m.time}`,\n        rowStyle:`display:flex;gap:9px;align-items:flex-start;${mine?'flex-direction:row-reverse':''}`,\n        avatarStyle:`width:28px;height:28px;flex:none;border-radius:50%;background:${p.c};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700`,\n        colStyle:`min-width:0;${mine?'text-align:right':''}`,\n        bubbleStyle:`display:inline-block;text-align:left;max-width:200px;padding:8px 11px;font-size:12.5px;line-height:1.35;${mine?'background:#c66a4a;color:#fff;border-radius:12px 4px 12px 12px':'background:#fffdf9;border-radius:4px 12px 12px 12px'}`,\n        metaStyle:'font-size:10.5px;color:#a89a83;margin-top:3px'}; });\n\n    let nearbyText='Book a desk to see who\\u2019s around you.';\n    if(md){ const mates=md.office.seats.filter(s=>s&&s!==me); nearbyText=mates.length?`${mates.slice(0,3).join(', ')}${mates.length>3?' +more':''} are in with you`:'You have the room to yourself today'; }\n\n    return {\n      notSignedIn:false, signedIn:true, loginPeople,\n      flash:this.state.flash,\n      meName:me, meInitials:mep.i, meOffice:`${this.myOffice()} · staff`,\n      meAvatarStyle:`width:34px;height:34px;flex:none;border-radius:50%;background:${mep.c};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px`,\n      signOut:()=>this.signOut(), isAdmin:this.isAdmin,\n      dateStr:'Tuesday · July 8', pageTitle:titles[view]||'',\n      isHome:view==='home', isPlan:view==='plan', isDesks:view==='desks', isRoom:view==='room', isPeople:view==='people', isFacilities:view==='facilities',\n      nav,\n      // hero\n      heroKicker: md?\"You're all set for today\":'No desk booked yet',\n      myDeskLabel: md?`Desk ${md.di+1} · ${md.office.name} (${md.office.side})`:'Tap a free desk to book',\n      nearbyText,\n      checkBadgeStyle: md?'padding:10px 16px;border-radius:11px;background:#eaf1e7;color:#4f7a53;font-weight:600;font-size:13px':'padding:10px 16px;border-radius:11px;background:#eee8dd;color:#a89a83;font-weight:600;font-size:13px',\n      checkBadgeLabel: md?'✓ Checked in':'Not in yet',\n      freeLabel:`${free} of 15 desks free`,\n      roomStatusStyle: busyNow?'padding:5px 12px;border-radius:9px;background:#f3e4dc;color:#b5674a;font-weight:600;font-size:12px':'padding:5px 12px;border-radius:9px;background:#eaf1e7;color:#4f7a53;font-weight:600;font-size:12px',\n      roomStatusLabel: busyNow?'Busy now':'Free now',\n      roomCountLabel:`${this.state.bookings.length} booked today`,\n      openLabel:`${this.state.facilities.length} open`,\n      planTodayLabel: myTodayPlan?'Submitted ✓':'Not submitted',\n      planTodayStyle: myTodayPlan?'padding:3px 11px;border-radius:20px;background:#eaf1e7;color:#4f7a53;font-size:11.5px;font-weight:600':'padding:3px 11px;border-radius:20px;background:#f3e4dc;color:#b5674a;font-size:11.5px;font-weight:600',\n      planHint: myTodayPlan?myTodayPlan.line1:'Tap to submit your daily or weekly plan.',\n      // lists\n      homeOffices:this.buildOffices('mini'), deskOffices:this.buildOffices('full'),\n      bookings, noBookings:this.state.bookings.length===0, timeOpts:this.genTimes(),\n      newStart:this.state.newStart, newEnd:this.state.newEnd, newTitle:this.state.newTitle,\n      onStartChange:(e)=>this.setState({newStart:e.target.value}), onEndChange:(e)=>this.setState({newEnd:e.target.value}), onTitleChange:(e)=>this.setState({newTitle:e.target.value}), bookRoom:()=>this.bookRoom(),\n      // plan\n      planScope:this.state.planScope, isDaily:this.state.planScope==='daily', isWeekly:this.state.planScope==='weekly',\n      planDate:this.PLAN_DATE, weekLabel:this.WEEK_LABEL, scopeSeg, modeSeg, weekRows,\n      planNote:this.state.planNote, weekNote:this.state.weekNote,\n      onPlanNote:(e)=>this.setState({planNote:e.target.value}), onWeekNote:(e)=>this.setState({weekNote:e.target.value}), submitPlan:()=>this.submitPlan(),\n      plansList, noPlans:this.state.plans.length===0,\n      facilities, peopleGroups, chat, onlineCount:9,\n      chatDraft:this.state.chatDraft, facDraft:this.state.facDraft,\n      goPlan:()=>this.go('plan'), goRoom:()=>this.go('room'), goFacilities:()=>this.go('facilities'),\n      releaseDesk:()=>this.releaseDesk(), reportIssue:()=>this.reportIssue(), sendChat:()=>this.sendChat(),\n      onChatInput:(e)=>this.setState({chatDraft:e.target.value}), onChatKey:(e)=>{if(e.key==='Enter')this.sendChat();},\n      onFacInput:(e)=>this.setState({facDraft:e.target.value}), onFacKey:(e)=>{if(e.key==='Enter')this.reportIssue();}\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
